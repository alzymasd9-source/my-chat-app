<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Pro - تطبيق الشات</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- الشريط الجانبي -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>💬 Discord Pro</h1>
                <p class="subtitle">شات كتابي - شات اليمن</p>
            </div>

            <!-- معلومات المستخدم -->
            <div class="user-info">
                <div class="user-profile">
                    <span class="avatar" id="userAvatar">👤</span>
                    <div class="user-details">
                        <input 
                            type="text" 
                            id="usernameInput" 
                            placeholder="أدخل اسمك"
                            class="username-input"
                        >
                        <select id="statusSelect" class="status-select">
                            <option value="online">🟢 نشط</option>
                            <option value="idle">🟡 بعيد</option>
                            <option value="dnd">🔴 مشغول</option>
                            <option value="offline">⚫ غير متصل</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- قائمة الغرف -->
            <div class="channels">
                <h3>الغرف</h3>
                <div class="channel-list">
                    <div class="channel active" data-room="عام">
                        <span>#</span> عام
                    </div>
                    <div class="channel" data-room="تطوير">
                        <span>#</span> تطوير
                    </div>
                    <div class="channel" data-room="عشوائي">
                        <span>#</span> عشوائي
                    </div>
                    <div class="channel" data-room="مساعدة">
                        <span>#</span> مساعدة
                    </div>
                </div>
            </div>

            <!-- قائمة المستخدمين النشطين -->
            <div class="online-users">
                <h3>المستخدمون النشطون</h3>
                <div id="usersList" class="users-list">
                    <p class="empty-state">لا يوجد مستخدمون متصلون</p>
                </div>
            </div>
        </aside>

        <!-- منطقة الشات الرئيسية -->
        <main class="chat-main">
            <!-- رأس الشات -->
            <header class="chat-header">
                <div class="header-title">
                    <h2 id="currentRoom"># عام</h2>
                    <p id="roomDescription">غرفة الشات العامة</p>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" title="البحث">🔍</button>
                    <button class="btn-icon" title="الإعدادات">⚙️</button>
                </div>
            </header>

            <!-- منطقة الرسائل -->
            <div class="messages-container">
                <div id="messagesArea" class="messages-area">
                    <div class="welcome-message">
                        <h3>👋 مرحباً بك في تطبيق الشات!</h3>
                        <p>اختر غرفة وابدأ المحادثة</p>
                    </div>
                </div>

                <!-- مؤشر الكتابة -->
                <div id="typingIndicator" class="typing-indicator" style="display: none;">
                    <p><span id="typingUser"></span> يكتب...</p>
                </div>
            </div>

            <!-- منطقة إدخال الرسالة -->
            <footer class="chat-footer">
                <div class="input-container">
                    <button class="btn-attach" title="إرسال ملف">📎</button>
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="اكتب رسالتك هنا..."
                        class="message-input"
                    >
                    <button id="sendBtn" class="btn-send" title="إرسال">📤</button>
                </div>
                <div class="chat-info">
                    <p id="onlineCount">المتصلون: 0</p>
                </div>
            </footer>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
